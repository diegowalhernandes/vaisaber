<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz do Conhecimento</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

  <!-- ══════════════════════════════ -->
  <!-- TELA INICIAL                  -->
  <!-- ══════════════════════════════ -->
  <div id="startScreen">
    <h1>Quiz do Conhecimento</h1>
    <p class="start-description">
      Responda 15 perguntas e acumule o máximo de XP!<br>
      Você avança mesmo errando. 😄
    </p>

    <!-- Preview das ajudas disponíveis -->
    <div class="ajudas-preview">
      <span class="ajuda-chip">🔥 Eliminar 2</span>
      <span class="ajuda-chip">⏭️ Pular</span>
      <span class="ajuda-chip">💡 Dica IA</span>
    </div>

    <button class="main-btn" onclick="startGame()">🚀 Começar</button>
  </div>

  <!-- ══════════════════════════════ -->
  <!-- TELA DO JOGO                  -->
  <!-- ══════════════════════════════ -->
  <div id="gameScreen" style="display:none">

    <!-- XP atual -->
    <div id="score">⭐ XP: 0</div>

    <!-- Placar acertos/erros -->
    <div class="scoreboard">
      <div class="score-card acertos" id="cardAcertos">
        <span class="icon">✅</span>
        <div class="score-card-inner">
          <span class="label">Acertos</span>
          <span class="count" id="countAcertos">0</span>
        </div>
      </div>
      <div class="score-card erros" id="cardErros">
        <span class="icon">❌</span>
        <div class="score-card-inner">
          <span class="label">Erros</span>
          <span class="count" id="countErros">0</span>
        </div>
      </div>
    </div>

    <!-- Barra de progresso -->
    <div class="progress-wrapper">
      <div class="progress-header">
        <span id="progress">Pergunta 1 de 15</span>
        <span id="progressPct" style="font-size:0.85rem;font-weight:700;color:var(--cor-roxo)">0%</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
    </div>

    <!-- XP disponível nesta pergunta -->
    <div class="xp-disponivel">Esta pergunta vale: <strong id="xpPergunta">+50 XP</strong></div>

    <!-- Pergunta -->
    <h2 id="question"></h2>

    <!-- Respostas -->
    <div id="answers"></div>

    <!-- Caixa da dica (aparece ao usar a ajuda) -->
    <div id="dicaBox"></div>

    <!-- ── Ajudas ── -->
    <div class="ajudas-section">
      <div class="ajudas-label">⚡ Ajudas — 1 uso cada</div>
      <div class="ajudas-row">

        <button class="ajuda-btn" id="ajuda-eliminar" onclick="usarEliminar()" title="Elimina 2 respostas erradas">
          <span class="ajuda-icon">🔥</span>
          <span class="ajuda-nome">Eliminar 2</span>
        </button>

        <button class="ajuda-btn" id="ajuda-pular" onclick="usarPular()" title="Pula sem contar erro">
          <span class="ajuda-icon">⏭️</span>
          <span class="ajuda-nome">Pular</span>
        </button>

        <button class="ajuda-btn" id="ajuda-dica" onclick="usarDica()" title="Gera uma dica">
          <span class="ajuda-icon">💡</span>
          <span class="ajuda-nome">Dica IA</span>
        </button>

      </div>
    </div>

    <!-- Botão próxima -->
    <button id="nextBtn" onclick="nextQuestion()">Próxima ➜</button>

  </div>

  <!-- ══════════════════════════════ -->
  <!-- TELA FINAL                    -->
  <!-- ══════════════════════════════ -->
  <div id="endScreen" style="display:none">

    <h1 id="finalMessage"></h1>

    <div class="result-summary">
      <div class="result-card acertos">
        <span class="r-icon">✅</span>
        <span class="r-count" id="finalAcertos">0</span>
        <span class="r-label">Acertos</span>
      </div>
      <div class="result-card erros">
        <span class="r-icon">❌</span>
        <span class="r-count" id="finalErros">0</span>
        <span class="r-label">Erros</span>
      </div>
      <div class="result-card ajudas">
        <span class="r-icon">🃏</span>
        <span class="r-count" id="finalAjudas">0</span>
        <span class="r-label">Ajudas</span>
      </div>
    </div>

    <p id="finalXP" style="font-size:1.6rem;font-weight:800;margin:0.5rem 0;"></p>
    <p id="finalNivel" style="font-size:1.1rem;font-weight:600;margin:0.25rem 0;"></p>
    <p class="performance-msg" id="performanceMsg"></p>
    <button class="main-btn" onclick="restartGame()">🔄 Jogar novamente</button>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
